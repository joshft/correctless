<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">

{% seo %}
    <link rel="stylesheet" href="{{ "/assets/css/style.css?v=" | append: site.github.build_revision | relative_url }}">
    <style>
      [data-theme="dark"] { background-color: #0d1117; color: #c9d1d9; }
      [data-theme="dark"] .markdown-body { color: #c9d1d9; }
      [data-theme="dark"] .markdown-body h1,
      [data-theme="dark"] .markdown-body h2,
      [data-theme="dark"] .markdown-body h3,
      [data-theme="dark"] .markdown-body h4 { color: #e6edf3; }
      [data-theme="dark"] .markdown-body a { color: #58a6ff; }
      [data-theme="dark"] .markdown-body code { background-color: #161b22; color: #c9d1d9; }
      [data-theme="dark"] .markdown-body pre { background-color: #161b22; }
      [data-theme="dark"] .markdown-body table th,
      [data-theme="dark"] .markdown-body table td { border-color: #30363d; }
      [data-theme="dark"] .markdown-body table tr { background-color: #0d1117; border-color: #30363d; }
      [data-theme="dark"] .markdown-body table tr:nth-child(2n) { background-color: #161b22; }
      [data-theme="dark"] .markdown-body blockquote { color: #8b949e; border-left-color: #30363d; }
      [data-theme="dark"] .markdown-body hr { background-color: #30363d; }
      [data-theme="dark"] .footer { border-color: #30363d !important; }
      .theme-toggle { position: fixed; top: 12px; right: 16px; z-index: 100; background: none; border: 1px solid #d0d7de; border-radius: 6px; padding: 4px 8px; cursor: pointer; font-size: 18px; line-height: 1; }
      [data-theme="dark"] .theme-toggle { border-color: #30363d; }
    </style>
  </head>
  <body>
    <button class="theme-toggle" id="theme-toggle" title="Toggle dark mode" aria-label="Toggle dark mode">🌙</button>
    <div class="container-lg px-3 my-5 markdown-body">
      {% if site.title and site.title != page.title %}
      <h1><a href="{{ "/" | absolute_url }}">{{ site.title }}</a></h1>
      {% endif %}

      {{ content }}

      {% if site.github.private != true and site.github.license %}
      <div class="footer border-top border-gray-light mt-5 pt-3 text-right text-gray">
        This site is open source. {% github_edit_link "Improve this page" %}.
      </div>
      {% endif %}
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/anchor-js/4.1.0/anchor.min.js" integrity="sha256-lZaRhKri35AyJSypXXs4o6OPFTbTmUoltBbDCbdzegg=" crossorigin="anonymous"></script>
    <script>anchors.add();</script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10.9.1/dist/mermaid.min.js"></script>
    <script>
      document.addEventListener('DOMContentLoaded', function () {
        var isDark = document.body.getAttribute('data-theme') === 'dark';
        mermaid.initialize({ startOnLoad: false, theme: isDark ? 'dark' : 'default' });
        document.querySelectorAll('code.language-mermaid').forEach(function (el) {
          var pre = el.parentElement;
          var container = document.createElement('div');
          container.classList.add('mermaid');
          container.textContent = el.textContent;
          pre.parentElement.replaceChild(container, pre);
        });
        mermaid.run();
      });
    </script>
    <script>
      (function() {
        var btn = document.getElementById('theme-toggle');
        var saved = localStorage.getItem('theme');
        var preferred = saved || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        if (preferred === 'dark') { document.body.setAttribute('data-theme', 'dark'); btn.textContent = '\u2600\uFE0F'; }
        btn.addEventListener('click', function() {
          var isDark = document.body.getAttribute('data-theme') === 'dark';
          if (isDark) { document.body.removeAttribute('data-theme'); btn.textContent = '\uD83C\uDF19'; localStorage.setItem('theme', 'light'); }
          else { document.body.setAttribute('data-theme', 'dark'); btn.textContent = '\u2600\uFE0F'; localStorage.setItem('theme', 'dark'); }
        });
      })();
    </script>
    {% if site.google_analytics %}
    <script>
      (function(i,s,o,g,r,a,m){i['GoogleAnalyticsObject']=r;i[r]=i[r]||function(){
      (i[r].q=i[r].q||[]).push(arguments)},i[r].l=1*new Date();a=s.createElement(o),
      m=s.getElementsByTagName(o)[0];a.async=1;a.src=g;m.parentNode.insertBefore(a,m)
      })(window,document,'script','//www.google-analytics.com/analytics.js','ga');
      ga('create', '{{ site.google_analytics }}', 'auto');
      ga('send', 'pageview');
    </script>
    {% endif %}
  </body>
</html>
