title: Correctless
description: Correctness-oriented development workflow for Claude Code
remote_theme: just-the-docs/just-the-docs@v0.10.1

url: https://joshft.github.io
baseurl: /correctless

plugins:
  - jekyll-remote-theme

color_scheme: dark

search_enabled: true
search:
  heading_level: 3

heading_anchors: true
back_to_top: true
back_to_top_text: "Back to top"

aux_links:
  GitHub:
    - https://github.com/joshft/correctless

aux_links_new_tab: true

mermaid:
  version: "10.9.1"

footer_content: >-
  Correctless &mdash; correctness-oriented development for Claude Code.
  <a href="https://github.com/joshft/correctless">View source</a>.

callouts:
  note:
    title: Note
    color: blue
  warning:
    title: Warning
    color: yellow
  important:
    title: Important
    color: red
