name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Run tests
        run: |
          bash test.sh
          bash test-mcp.sh
          bash test-bugfixes.sh
          bash test-qol.sh
          bash test-decisions.sh
          bash test-statusline.sh

      - name: Verify sync
        run: |
          bash sync.sh
          git diff --exit-code || (echo "sync.sh produced changes — run sync.sh and commit" && exit 1)

  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38 # v2.0.0
        with:
          scandir: ./hooks
          additional_files: sync.sh setup
          severity: warning
