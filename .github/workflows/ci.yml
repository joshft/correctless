name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Tests (jq ${{ matrix.jq_version }})
    runs-on: ubuntu-latest
    # AP-011: Matrix across jq versions to catch operator precedence and
    # other version-portability bugs before they hit main. See PMB-001.
    # Minimum supported is jq 1.7 (Ubuntu 24.04 LTS). jq 1.6 has known
    # incompatibilities and is not supported — see ENV-002.
    strategy:
      fail-fast: false
      matrix:
        jq_version: ["1.7.1", "1.8.1"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install jq ${{ matrix.jq_version }}
        run: |
          case "${{ matrix.jq_version }}" in
            "1.7.1")
              url="https://github.com/jqlang/jq/releases/download/jq-1.7.1/jq-linux-amd64"
              ;;
            "1.8.1")
              url="https://github.com/jqlang/jq/releases/download/jq-1.8.1/jq-linux-amd64"
              ;;
            *)
              echo "Unknown jq version: ${{ matrix.jq_version }}" >&2
              exit 1
              ;;
          esac
          sudo curl -fsSL "$url" -o /usr/local/bin/jq
          sudo chmod +x /usr/local/bin/jq
          jq --version

      - name: Configure git identity for tests
        run: |
          git config --global user.email "ci@correctless.dev"
          git config --global user.name "CI"

      - name: Run tests
        run: |
          bash tests/test.sh
          bash tests/test-mcp.sh
          bash tests/test-bugfixes.sh
          bash tests/test-qol.sh
          bash tests/test-decisions.sh
          bash tests/test-statusline.sh
          bash tests/test-consolidation.sh
          bash tests/test-crelease.sh
          bash tests/test-calm-resets.sh
          bash tests/test-dynamic-rigor.sh
          bash tests/test-intensity-detection.sh
          bash tests/test-wire-intensity-creview.sh
          bash tests/test-wire-intensity-pipeline.sh
          bash tests/test-cexplain.sh
          bash tests/test-auto-format.sh
          bash tests/test-sensitive-file-guard.sh
          bash tests/test-antipattern-scan.sh
          bash tests/test-lib.sh
          bash tests/test-lib-locking.sh
          bash tests/test-gate-path-exceptions.sh
          bash tests/test-hook-sync.sh
          bash tests/test-shift-left-review.sh
          bash tests/test-token-tracking.sh
          bash tests/test-token-tracking-setup.sh
          bash tests/test-workflow-gate.sh
          bash tests/test-ci-hook-wiring.sh
          bash tests/test-intensity-calibration.sh
          bash tests/test-auto-recurring-patterns.sh
          bash tests/test-token-aware-intensity.sh
          bash tests/test-allowed-tools-check.sh
          bash tests/test-token-tracking-skill-field.sh
          bash tests/test-semi-auto-mode.sh
          bash tests/test-architecture-drift.sh
          bash tests/test-fix-diff-reviewer-agent.sh
          bash tests/test-auto-state-ext.sh
          bash tests/test-auto-policy.sh
          bash tests/test-decision-record.sh
          bash tests/test-auto-agents.sh
          bash tests/test-auto-budget.sh
          bash tests/test-auto-safety.sh
          bash tests/test-auto-report.sh
          bash tests/test-auto-review-triage.sh
          bash tests/test-auto-mandate.sh
          bash tests/test-auto-override.sh
          bash tests/test-auto-crosscheck.sh
          bash tests/test-auto-phase3-pipeline.sh
          bash tests/test-auto-phase3-supervisor.sh
          bash tests/test-test-evasion-antipatterns.sh
          bash tests/test-scripts-namespace-migration.sh
          bash tests/test-spec-mutation-alerts.sh
          bash tests/test-override-freq-metrics.sh
          bash tests/test-stale-hook-detection.sh
          bash tests/test-carchitect.sh
          bash tests/test-tdd-mini-audit.sh
          bash tests/test-integration-test-contracts.sh
          bash tests/test-carchitect-phase1.sh
          bash tests/test-dev-journal.sh
          bash tests/test-qa-uncertain.sh
          bash tests/test-agent-hooks.sh
          bash tests/test-project-dashboard.sh
          bash tests/test-session-cost.sh
          bash tests/test-test-harness-extraction.sh
          bash tests/test-upgrade-compatibility-lens.sh
          bash tests/test-skill-path-discovery.sh
          bash tests/test-statusline-live-cost.sh
          bash tests/test-harness-fingerprint.sh
          bash tests/test-canonicalize-path.sh
          bash tests/test-audit-findings-persistence.sh
          bash tests/test-qa-severity-calibration.sh
          bash tests/test-structural-enforcement-pat.sh
          bash tests/test-carchitect-phase2.sh
          bash tests/test-carchitect-phase3.sh
          bash tests/test-carchitect-phase4.sh
          bash tests/test-carchitect-phase5.sh
          bash tests/test-autonomous-skill-contract.sh
          bash tests/test-audit-escape-metrics.sh
          bash tests/test-pipeline-completeness-verification.sh
          bash tests/test-ux-review-lens.sh
          bash tests/test-integration-depth-lens.sh
          bash tests/test-ctdd-green-agent.sh
          bash tests/test-creview-spec-agents.sh
          bash tests/test-cspec-research-agent.sh

      - name: Verify sync
        run: |
          bash sync.sh
          git diff --exit-code || (echo "sync.sh produced changes — run sync.sh and commit" && exit 1)

  test-suite:
    name: Test Suite
    runs-on: ubuntu-latest
    needs: test
    if: always()
    steps:
      - name: Check matrix results
        run: |
          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "Test matrix failed: ${{ needs.test.result }}"
            exit 1
          fi

  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38 # v2.0.0
        with:
          scandir: ./hooks
          additional_files: sync.sh setup scripts/lib.sh scripts/antipattern-scan.sh
          severity: warning
