[default.extend-words]
# Regex character classes in grep patterns are not typos
ommit = "ommit"
anual = "anual"
elease = "elease"
ibrary = "ibrary"
# BLOCKINGs is the plural of BLOCKING (severity level) — typos sees BLOCKIN as a misspelling
# and separately wants to "correct" BLOCKINGs → BLOCKINGGs. Whitelist both forms.
BLOCKIN = "BLOCKIN"
BLOCKINGs = "BLOCKINGs"
# grep prefix pattern matching both "promote" and "promotion" in test assertions
promot = "promot"
# grep prefix pattern matching both "truncated" and "truncation" in test assertions
truncat = "truncat"
# Design Contract lens keywords (agents/design-contract-lenses.tsv) — compound
# tokens the typos hook must not mangle (esp. the long hyphenated ones).
cardinality = "cardinality"
tool-surface = "tool-surface"
content-fidelity = "content-fidelity"
extraction-rejection = "extraction-rejection"
authoring-affordance = "authoring-affordance"
gate-scope = "gate-scope"
unbounded-input-bounded-medium = "unbounded-input-bounded-medium"
mechanism-capability-mismatch = "mechanism-capability-mismatch"

[files]
# The lens registry is a source-only TSV of curated tokens — never spell-check it.
extend-exclude = ["agents/design-contract-lenses.tsv"]
